<!-- Style Sheet -->
<style>
    body.opcda-tree-modal-open {
        overflow: hidden;
    }

    .opcda-tree-editor {
        width: 100%;
        min-height: 120px;
        border: 1px solid var(--red-ui-form-input-border-color, #d9d9d9);
        background: var(--red-ui-form-input-background, #fff);
        border-radius: 4px;
        overflow: auto;
    }

    .opcda-tree-row {
        display: flex;
        align-items: center;
        gap: 5px;
        min-height: 24px;
        padding: 2px 6px;
        font-size: 12px;
        border-bottom: 1px solid transparent;
    }

    .opcda-tree-row:hover {
        background: var(--red-ui-list-item-background-hover, #f3f7fd);
    }

    .opcda-tree-row.is-selected {
        background: var(--red-ui-list-item-background-selected, #d9ecff);
        color: var(--red-ui-list-item-color-selected, inherit);
    }

    .opcda-tree-indent {
        flex: 0 0 auto;
        width: 14px;
    }

    .opcda-tree-twisty {
        width: 16px;
        text-align: center;
        color: #777;
        flex: 0 0 16px;
        cursor: pointer;
    }

    .opcda-tree-icon {
        width: 14px;
        text-align: center;
        color: #777;
        flex: 0 0 14px;
    }

    .opcda-tree-label {
        flex: 1 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .opcda-tree-type {
        color: #777;
        font-size: 11px;
        flex: 0 0 auto;
    }

    .opcda-tree-title {
        min-width: 100px;
        font-weight: 600;
        color: #444;
    }

    .opcda-client-nodeid-label {
        margin-left: auto;
        text-align: right;
        word-break: break-all;
        max-width: 320px;
        color: #777;
        font-size: 12px;
    }

    .opcda-tree-actions {
        margin-left: auto;
        display: flex;
        gap: 6px;
        align-items: center;
    }

    .opcda-tree-empty {
        padding: 14px;
        border: 1px dashed #d9d9d9;
        border-radius: 4px;
        background: #fafafa;
        color: #777;
        text-align: center;
    }

    .opcda-client-json {
        width: 100%;
        box-sizing: border-box;
    }

    .opcda-client-tag-box {
        width: 100%;
        min-height: 70px;
    }

    .opcda-client-tag-chip {
        display: grid;
        grid-template-columns: 18px 1fr auto;
        grid-template-areas:
            "icon name name"
            "icon write right";
        column-gap: 8px;
        row-gap: 6px;
        align-items: center;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background: #fafafa;
        padding: 6px 8px;
        margin-bottom: 6px;
    }

    .opcda-client-tag-chip .opcda-tree-icon {
        grid-area: icon;
    }

    .opcda-client-tag-chip .opcda-tree-title {
        grid-area: name;
        min-width: 0;
    }

    .opcda-client-tag-right {
        grid-area: right;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .opcda-client-tag-right .opcda-client-nodeid-label {
        margin: 0;
        max-width: 320px;
    }

    .opcda-client-tag-right .opcda-tree-actions {
        margin: 0;
    }

    .opcda-client-tag-chip-meta,
    .opcda-client-description {
        color: #777;
        font-size: 12px;
    }

    .opcda-client-tag-write {
        display: flex;
        gap: 8px;
        align-items: center;
        width: 100%;
        margin-top: 0;
        margin-left: 0;
        grid-area: write;
    }

    .opcda-client-tag-write input {
        font-size: 12px;
        flex: 1 1 auto;
        min-width: 120px;
    }

    .opcda-client-tag-write .red-ui-typedInput-container {
        flex: 1 1 auto;
        min-width: 220px;
        width: 100% !important;
    }

    .opcda-client-tag-write .red-ui-typedInput-container input.red-ui-typedInput-input {
        width: calc(100% - 92px);
        min-width: 120px;
    }

    .opcda-client-load-row {
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .opcda-client-load-row input {
        flex: 1 1 auto;
    }

    .opcda-tree-search {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 6px 10px;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        background: #fafafa;
    }

    .opcda-tree-search input {
        flex: 1 1 auto;
        min-width: 120px;
        border: 0;
        outline: 0;
        background: transparent;
        box-shadow: none;
        margin: 0;
    }

    .opcda-tree-modal {
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: rgba(0, 0, 0, 0.45);
        padding: 24px;
        box-sizing: border-box;
    }

    .opcda-tree-modal__dialog {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        background: #f3f3f3;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .opcda-tree-modal__header,
    .opcda-tree-modal__toolbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        padding: 14px 18px;
        background: #fff;
        border-bottom: 1px solid #d9d9d9;
    }

    .opcda-tree-modal__title {
        font-size: 18px;
        font-weight: 600;
        color: #333;
    }

    .opcda-tree-modal__header .editor-button-small {
        margin-left: auto;
    }

    .opcda-tree-modal__body {
        flex: 1 1 auto;
        overflow: auto;
        padding: 18px;
    }

    .opcda-tree-context-menu {
        position: fixed;
        z-index: 2200;
        min-width: 170px;
        background: #fff;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
        padding: 6px 0;
    }

    .opcda-tree-context-menu a {
        display: block;
        padding: 7px 12px;
        color: #333;
        text-decoration: none;
        font-size: 12px;
    }

    .opcda-tree-context-menu a:hover {
        background: #f3f7fd;
    }
</style>

<!-- Node Definition and Editor Logic -->
<script type="text/javascript">
    (function () {
        console.log("opcda-client frontend script loaded directly");
        var selectedItemsState = [];
        var selectedItemIdSet = {};
        var browseState = null;
        var expansionState = {};
        var browseSearchValue = "";
        var browseSearchTerm = "";
        var contextMenuPath = "";
        var browseSelectedPath = "";
        var renderPending = false;

        function debounce(fn, delay) {
            var timer;
            return function () {
                var ctx = this, args = arguments;
                clearTimeout(timer);
                timer = setTimeout(function () { fn.apply(ctx, args); }, delay);
            };
        }

        function rebuildItemIdIndex() {
            selectedItemIdSet = {};
            selectedItemsState.forEach(function (item, i) {
                var id = item.itemID;
                if (id !== undefined && id !== null) selectedItemIdSet[id] = i;
            });
        }

        function openBrowseModal() { 
            $("#node-input-opcda-browse-modal").show(); 
            $("body").addClass("opcda-tree-modal-open"); 
        }

        function closeBrowseModal() {
            hideTreeContextMenu();
            $("#node-input-opcda-browse-modal").hide();
            $("body").removeClass("opcda-tree-modal-open");
        }

        function getBrowseCacheKey() {
            var connectionId = $("#node-input-connection").val() || "";
            if (!connectionId) return "";
            return "opcda-client-browse-cache:" + connectionId;
        }

        function saveBrowseSession() {
            var key = getBrowseCacheKey();
            if (!key || !window.sessionStorage) return;
            try {
                sessionStorage.setItem(key, JSON.stringify({
                    browseState: browseState,
                    expansionState: expansionState
                }));
            } catch (error) { }
        }

        function loadBrowseSession() {
            var key = getBrowseCacheKey();
            if (!key || !window.sessionStorage) return false;
            try {
                var raw = sessionStorage.getItem(key);
                if (!raw) return false;
                var parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== "object") return false;
                browseState = parsed.browseState && typeof parsed.browseState === "object" ? parsed.browseState : null;
                expansionState = parsed.expansionState && typeof parsed.expansionState === "object" ? parsed.expansionState : {};
                return !!browseState;
            } catch (error) {
                return false;
            }
        }

        function parseSelectedItems(rawValue) {
            if (!rawValue) return [];
            try {
                var parsed = rawValue;
                if (typeof rawValue === "string") {
                    parsed = JSON.parse(rawValue);
                }
                if (!Array.isArray(parsed)) return [];

                return parsed
                    .filter(function (item) {
                        return item && typeof item === "object" && !Array.isArray(item);
                    })
                    .map(function (item) {
                        var id = "";
                        if (typeof item.itemID === "string") id = item.itemID;
                        else if (typeof item.nodeID === "string") id = item.nodeID;
                        else if (typeof item.nodeId === "string") id = item.nodeId;
                        else if (item.itemID !== undefined && item.itemID !== null) id = String(item.itemID);
                        else if (item.nodeID !== undefined && item.nodeID !== null) id = String(item.nodeID);
                        else if (item.nodeId !== undefined && item.nodeId !== null) id = String(item.nodeId);

                        return {
                            name: typeof item.name === "string" ? item.name.trim() : "",
                            itemID: id.trim(),
                            nodeClass: typeof item.nodeClass === "string" ? item.nodeClass.trim() : "Variable",
                            valueProperty: typeof item.valueProperty === "string" && item.valueProperty.trim() ? item.valueProperty.trim() : "payload",
                            valuePropertyType: (item.valuePropertyType === "msg" || item.valuePropertyType === "flow" || item.valuePropertyType === "global") ? item.valuePropertyType : "msg"
                        };
                    })
                    .filter(function (item) {
                        return item.itemID !== undefined && item.itemID !== null;
                    });
            } catch (error) {
                return [];
            }
        }

        function serializeSelectedItems(items) {
            return JSON.stringify(items.map(function (item) {
                var result = {
                    name: item.name || item.itemID,
                    itemID: item.itemID,
                    nodeClass: item.nodeClass || "Variable"
                };

                if (item.valueProperty) result.valueProperty = item.valueProperty;
                if (item.valuePropertyType) result.valuePropertyType = item.valuePropertyType;

                return result;
            }), null, 2);
        }

        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, function (char) {
                return {
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#39;"
                }[char];
            });
        }

        function updateSelectedItemsField() {
            var serialized = serializeSelectedItems(selectedItemsState);
            console.log("[OPC-DA] updateSelectedItemsField - serialized values:", serialized);
            if ($("#node-input-selectedItems").data("typedInput")) {
                $("#node-input-selectedItems").typedInput("value", serialized);
            } else {
                $("#node-input-selectedItems").val(serialized).trigger("change");
            }
            var tagList = selectedItemsState.map(function (item) { return item.itemID; }).join("\n");
            console.log("[OPC-DA] updateSelectedItemsField - tagList:", tagList);
            $("#node-input-tags").val(tagList).trigger("change");
        }

        function commitSelectedItemsState(node) {
            console.log("[OPC-DA] commitSelectedItemsState - selectedItemsState:", selectedItemsState);
            updateSelectedItemsField();

            if (!node) return;

            node.selectedItems = $("#node-input-selectedItems").val() || "[]";
            node.tags = $("#node-input-tags").val() || "";
            console.log("[OPC-DA] commitSelectedItemsState - node.selectedItems committed:", node.selectedItems);
            console.log("[OPC-DA] commitSelectedItemsState - node.tags committed:", node.tags);
        }

        function normalizeSearchTerm(value) {
            return String(value || "").trim().toLowerCase();
        }

        function textForSearch(item) {
            if (!item || typeof item !== "object") return "";
            return [
                item.name,
                item.itemID
            ].filter(Boolean).join(" ").toLowerCase();
        }

        function nodeMatchesSearch(item, term) {
            if (!term) return true;
            return textForSearch(item).indexOf(term) >= 0;
        }

        function branchHasSearchMatch(item, term) {
            if (nodeMatchesSearch(item, term)) return true;
            if (!item || !Array.isArray(item.browse)) return false;
            for (var i = 0; i < item.browse.length; i += 1) {
                if (branchHasSearchMatch(item.browse[i], term)) return true;
            }
            return false;
        }

        function renderSelectedItems() {
            var container = $("#opcda-selected-tags");
            if (!container.length) return;
            container.empty();

            if (!selectedItemsState.length) {
                container.append('<div class="opcda-tree-empty">No tags selected.</div>');
                return;
            }

            var writeMode = $("#node-input-mode").val() === "write";

            selectedItemsState.forEach(function (item, index) {
                var row = $('<div class="opcda-client-tag-chip" style="margin-bottom:4px;"></div>');
                var icon = item.nodeClass === "Object" ? "fa-folder" : "fa-tag";
                row.append('<div class="opcda-tree-icon"><i class="fa ' + icon + '"></i></div>');
                row.append('<div class="opcda-tree-title">' + escapeHtml(item.name || item.itemID) + '</div>');
                
                if (writeMode) {
                    var type = (item.valuePropertyType === "flow" || item.valuePropertyType === "global") ? item.valuePropertyType : "msg";
                    var prop = item.valueProperty || "payload";
                    row.append('<div class="opcda-client-tag-write">'
                        + '<input type="text" class="opcda-client-item-value-prop" id="opcda-client-item-value-prop-' + index + '" data-index="' + index + '" value="' + escapeHtml(prop) + '" placeholder="payload">'
                        + '<input type="hidden" class="opcda-client-item-value-type" id="opcda-client-item-value-type-' + index + '" data-index="' + index + '" value="' + escapeHtml(type) + '">'
                        + "</div>");
                }
                row.append('<div class="opcda-client-tag-right">'
                    + '<div class="opcda-client-nodeid-label">' + escapeHtml(item.itemID) + '</div>'
                    + '<div class="opcda-tree-actions"><a href="#" class="editor-button editor-button-small opcda-client-remove-tag" data-index="' + index + '"><i class="fa fa-trash"></i></a></div>'
                    + "</div>");
                container.append(row);
            });

            initializeSelectedItemTypedInputs();
        }

        function initializeSelectedItemTypedInputs() {
            $(".opcda-client-item-value-prop").each(function () {
                var input = $(this);
                var index = Number(input.attr("data-index"));
                var typeField = "#opcda-client-item-value-type-" + index;
                if (input.data("typedInputInitialized")) {
                    input.typedInput("types", ["msg", "flow", "global"]);
                    return;
                }

                input.typedInput({
                    type: $(typeField).val() || "msg",
                    types: ["msg", "flow", "global"],
                    typeField: typeField
                });
                input.data("typedInputInitialized", true);
            });
        }

        function syncSelectedItems() {
            rebuildItemIdIndex();
            updateSelectedItemsField();
            renderSelectedItems();
            renderBrowseTree();
        }

        function isExpanded(path, defaultValue) {
            if (expansionState[path] === undefined) {
                expansionState[path] = !!defaultValue;
            }
            return expansionState[path];
        }

        function selectedIndexByItemId(itemId) {
            var idx = selectedItemIdSet[itemId];
            return (idx !== undefined) ? idx : -1;
        }

        function canExpand(item) {
            return item && item.isFolder;
        }

        function itemIdOf(item) {
            if (!item) return "";
            var id = item.itemID !== undefined && item.itemID !== null ? item.itemID :
                     item.nodeId !== undefined && item.nodeId !== null ? item.nodeId :
                     item.nodeID !== undefined && item.nodeID !== null ? item.nodeID : null;
            return id !== null ? String(id).trim() : "";
        }

        function loadBrowse(itemId) {
            var connectionId = $("#node-input-connection").val();
            if (!connectionId) {
                RED.notify("Select an OPC DA connection before browsing.", "warning");
                return $.Deferred().reject().promise();
            }

            return $.getJSON("opcda-client-config/" + encodeURIComponent(connectionId) + "/browse", {
                itemID: itemId || ""
            });
        }

        function renderBrowseTree() {
            if (renderPending) return;
            renderPending = true;
            setTimeout(function () {
                renderPending = false;
                _doRenderBrowseTree();
            }, 0);
        }

        function _doRenderBrowseTree() {
            var container = $("#node-input-opcda-browse-tree");
            var frag = document.createDocumentFragment();

            if (!browseState) {
                var empty = document.createElement("div");
                empty.className = "opcda-tree-empty";
                empty.textContent = "Click Browse to load the server tree.";
                frag.appendChild(empty);
                container[0].innerHTML = "";
                container[0].appendChild(frag);
                return;
            }

            if (browseSearchTerm) {
                if (!branchHasSearchMatch(browseState, browseSearchTerm)) {
                    var noMatch = document.createElement("div");
                    noMatch.className = "opcda-tree-empty";
                    noMatch.textContent = "No items found in the already explored items.";
                    frag.appendChild(noMatch);
                    container[0].innerHTML = "";
                    container[0].appendChild(frag);
                    return;
                }
                renderBrowseRootFiltered(browseState, "root", 0, frag, browseSearchTerm);
                container[0].innerHTML = "";
                container[0].appendChild(frag);
                return;
            }

            renderBrowseRoot(browseState, "root", 0, frag);
            container[0].innerHTML = "";
            container[0].appendChild(frag);
        }

        function browseIconFor(item) {
            return item && item.isFolder ? "fa-folder" : "fa-tag";
        }

        function makeEl(tag, className, html) {
            var el = document.createElement(tag);
            if (className) el.className = className;
            if (html !== undefined) el.innerHTML = html;
            return el;
        }

        function makeTreeRow(path, extraClass) {
            var row = document.createElement("div");
            row.className = "opcda-tree-row" + (extraClass ? " " + extraClass : "");
            row.setAttribute("data-path", path);
            return row;
        }

        function renderBrowseRoot(root, path, depth, frag) {
            var expanded = isExpanded(path, true);
            var itemId = "";
            var selectedIndex = selectedIndexByItemId(itemId);
            var row = makeTreeRow(path, selectedIndex >= 0 ? "is-selected" : "");
            
            var actions = '<div class="opcda-tree-actions"><a href="#" class="editor-button editor-button-small opcda-client-toggle-tag" data-nodeid="' + escapeHtml(itemId) + '" data-path="' + escapeHtml(path) + '"><i class="fa ' + (selectedIndex >= 0 ? 'fa-minus' : 'fa-plus') + '"></i> ' + (selectedIndex >= 0 ? 'Remove' : 'Add') + '</a></div>';

            row.innerHTML = '<span class="opcda-tree-indent"></span>'
                + '<span class="opcda-tree-twisty opcda-client-toggle-tree" data-path="' + escapeHtml(path) + '">'
                + (expanded ? '<i class="fa fa-caret-down"></i>' : '<i class="fa fa-caret-right"></i>') + '</span>'
                + '<span class="opcda-tree-icon"><i class="fa fa-sitemap"></i></span>'
                + '<span class="opcda-tree-label">' + escapeHtml(root.name || "RootFolder") + '</span>'
                + '<span class="opcda-tree-type">Object</span>'
                + actions;
            frag.appendChild(row);

            if (!expanded) return;

            if (!Array.isArray(root.browse) || !root.browse.length) {
                frag.appendChild(makeEl("div", "opcda-tree-empty", "No items found.."));
            } else {
                root.browse.forEach(function (item, index) {
                    renderBrowseItem(item, path + ".browse." + index, depth + 1, frag);
                });
            }
        }

        function renderBrowseItem(item, path, depth, frag) {
            var expanded = isExpanded(path, false);
            var itemId = itemIdOf(item);
            var selectedIndex = selectedIndexByItemId(itemId);
            var hasChildren = canExpand(item);
            var row = makeTreeRow(path, selectedIndex >= 0 ? "is-selected" : "");

            var indents = "";
            for (var i = 0; i < depth; i += 1) indents += '<span class="opcda-tree-indent"></span>';

            var twisty = '<span class="opcda-tree-twisty' + (hasChildren ? ' opcda-client-toggle-tree' : '') + '" data-path="' + escapeHtml(path) + '">'
                + (hasChildren ? '<i class="fa ' + (expanded ? 'fa-caret-down' : 'fa-caret-right') + '"></i>' : '') + '</span>';

            var actions = itemId
                ? '<div class="opcda-tree-actions"><a href="#" class="editor-button editor-button-small opcda-client-toggle-tag" data-nodeid="' + escapeHtml(itemId) + '" data-path="' + escapeHtml(path) + '"><i class="fa ' + (selectedIndex >= 0 ? 'fa-minus' : 'fa-plus') + '"></i> ' + (selectedIndex >= 0 ? 'Remove' : 'Add') + '</a></div>'
                : '';

            var typeText = item.isFolder
                ? "Object"
                : ("Variable" + (item.type ? " | " + item.type : ""));
            var typeSpan = '<span class="opcda-tree-type">' + escapeHtml(typeText) + '</span>';

            row.innerHTML = indents + twisty
                + '<span class="opcda-tree-icon"><i class="fa ' + browseIconFor(item) + '"></i></span>'
                + '<span class="opcda-tree-label">' + escapeHtml(item.name || item.itemID) + '</span>'
                + typeSpan
                + '<span class="opcda-client-nodeid-label">' + escapeHtml(itemId) + '</span>'
                + actions;
            frag.appendChild(row);

            if (expanded && hasChildren) {
                if (Array.isArray(item.browse)) {
                    if (!item.browse.length) {
                        frag.appendChild(makeEl("div", "opcda-tree-empty", "No children found.."));
                    } else {
                        item.browse.forEach(function (child, index) {
                            renderBrowseItem(child, path + ".browse." + index, depth + 1, frag);
                        });
                    }
                } else {
                    frag.appendChild(makeEl("div", "opcda-tree-empty", "Searching for items..."));
                }
            }
        }

        function renderBrowseRootFiltered(root, path, depth, frag, term) {
            var row = makeTreeRow(path);
            row.innerHTML = '<span class="opcda-tree-indent"></span>'
                + '<span class="opcda-tree-twisty"><i class="fa fa-caret-down"></i></span>'
                + '<span class="opcda-tree-icon"><i class="fa fa-sitemap"></i></span>'
                + '<span class="opcda-tree-label">' + escapeHtml(root.name || "RootFolder") + '</span>';
            frag.appendChild(row);

            if (!Array.isArray(root.browse) || !root.browse.length) {
                frag.appendChild(makeEl("div", "opcda-tree-empty", "No items found."));
                return;
            }

            root.browse.forEach(function (item, index) {
                if (branchHasSearchMatch(item, term)) {
                    renderBrowseItemFiltered(item, path + ".browse." + index, depth + 1, frag, term, false);
                }
            });
        }

        function renderBrowseItemFiltered(item, path, depth, frag, term, ancestorMatched) {
            if (!branchHasSearchMatch(item, term)) return;

            var itemId = itemIdOf(item);
            var selectedIndex = selectedIndexByItemId(itemId);
            var hasChildren = canExpand(item);
            var subtreeVisible = !!ancestorMatched || nodeMatchesSearch(item, term);
            var hasMatchingLoadedChild = hasChildren && Array.isArray(item.browse) && item.browse.some(function (child) {
                return branchHasSearchMatch(child, term);
            });
            var hasExplicitExpansion = expansionState[path] !== undefined;
            var expanded = hasChildren && (hasExplicitExpansion
                ? !!expansionState[path]
                : ((subtreeVisible && Array.isArray(item.browse)) || hasMatchingLoadedChild));

            var row = makeTreeRow(path, selectedIndex >= 0 ? "is-selected" : "");

            var indents = "";
            for (var i = 0; i < depth; i += 1) indents += '<span class="opcda-tree-indent"></span>';

            var twisty = '<span class="opcda-tree-twisty' + (hasChildren ? ' opcda-client-toggle-tree' : '') + '" data-path="' + escapeHtml(path) + '">'
                + (hasChildren ? '<i class="fa ' + (expanded ? 'fa-caret-down' : 'fa-caret-right') + '"></i>' : '') + '</span>';

            var actions = itemId
                ? '<div class="opcda-tree-actions"><a href="#" class="editor-button editor-button-small opcda-client-toggle-tag" data-nodeid="' + escapeHtml(itemId) + '" data-path="' + escapeHtml(path) + '"><i class="fa ' + (selectedIndex >= 0 ? 'fa-minus' : 'fa-plus') + '"></i> ' + (selectedIndex >= 0 ? 'Remove' : 'Add') + '</a></div>'
                : '';

            var typeText = item.isFolder
                ? "Object"
                : ("Variable" + (item.type ? " | " + item.type : ""));
            var typeSpan = '<span class="opcda-tree-type">' + escapeHtml(typeText) + '</span>';

            row.innerHTML = indents + twisty
                + '<span class="opcda-tree-icon"><i class="fa ' + browseIconFor(item) + '"></i></span>'
                + '<span class="opcda-tree-label">' + escapeHtml(item.name || item.itemID) + '</span>'
                + typeSpan
                + '<span class="opcda-client-nodeid-label">' + escapeHtml(itemId) + '</span>'
                + actions;
            frag.appendChild(row);

            if (expanded && hasChildren) {
                if (Array.isArray(item.browse)) {
                    if (!item.browse.length) {
                        frag.appendChild(makeEl("div", "opcda-tree-empty", "No children found."));
                    } else {
                        item.browse.forEach(function (child, index) {
                            if (subtreeVisible || branchHasSearchMatch(child, term)) {
                                renderBrowseItemFiltered(child, path + ".browse." + index, depth + 1, frag, term, subtreeVisible);
                            }
                        });
                    }
                } else {
                    frag.appendChild(makeEl("div", "opcda-tree-empty", "Expanding..."));
                }
            }
        }

        function getItemAtPath(path) {
            var tokens = String(path || "").split(".");
            var current = browseState;

            for (var index = 0; index < tokens.length; index += 1) {
                var token = tokens[index];
                if (!token || token === "root") continue;
                if (!current) return null;
                if (/^\d+$/.test(token)) {
                    current = current[Number(token)];
                } else {
                    current = current[token];
                }
            }

            return current || null;
        }

        function addSelectedItem(item) {
            var itemId = itemIdOf(item);
            var normalized = {
                name: item.name || itemId,
                itemID: itemId,
                nodeClass: item.isFolder ? "Object" : "Variable",
                valueProperty: "payload",
                valuePropertyType: "msg"
            };
            var currentIndex = selectedIndexByItemId(normalized.itemID);

            if (currentIndex >= 0) {
                selectedItemsState[currentIndex] = normalized;
            } else {
                selectedItemsState.push(normalized);
            }

            syncSelectedItems();
        }

        function removeSelectedItemByIndex(index) {
            if (index >= 0 && index < selectedItemsState.length) {
                selectedItemsState.splice(index, 1);
                syncSelectedItems();
            }
        }

        function toggleSelectedNode(path) {
            var item = getItemAtPath(path);
            if (!item) return;
            var itemId = itemIdOf(item);
            if (itemId === null || itemId === undefined) return;

            var currentIndex = selectedIndexByItemId(itemId);
            if (currentIndex >= 0) {
                selectedItemsState.splice(currentIndex, 1);
            } else {
                addSelectedItem(item);
                return;
            }

            syncSelectedItems();
        }

        function refreshBrowseRoot() {
            var container = $("#node-input-opcda-browse-tree");
            container.html('<div class="opcda-tree-empty">Loading...</div>');

            loadBrowse("").done(function (payload) {
                browseState = payload || {};
                browseState.itemID = "";
                browseState.name = "RootFolder";
                browseState.isFolder = true;
                expansionState = { root: true };
                saveBrowseSession();
                renderBrowseTree();
            }).fail(function (xhr) {
                var message = xhr && xhr.responseJSON && xhr.responseJSON.error
                    ? xhr.responseJSON.error
                    : "Failed to browse the OPC DA server.";
                browseState = null;
                container.html('<div class="opcda-tree-empty">' + escapeHtml(message) + '</div>');
                RED.notify(message, "error");
            });
        }

        function hideTreeContextMenu() {
            $("#node-input-opcda-browse-context-menu").hide();
        }

        function showTreeContextMenu(x, y, path) {
            var menu = $("#node-input-opcda-browse-context-menu");
            var item = getItemAtPath(path);
            contextMenuPath = path || "";
            var isFolder = !!item && item.isFolder;
            var hasId = !!itemIdOf(item);

            $("#node-input-opcda-browse-context-refresh").toggle(isFolder);
            $("#node-input-opcda-browse-context-copy-itemid").toggle(hasId);
            $("#node-input-opcda-browse-context-read-value").toggle(!!item && !isFolder && hasId);
            menu.css({ left: x + "px", top: y + "px" }).show();
        }

        function copyNodeIdFromPath(path) {
            var item = getItemAtPath(path);
            console.log("copyNodeIdFromPath - path:", path, "item:", item);
            var itemId = itemIdOf(item);
            console.log("copyNodeIdFromPath - itemId:", itemId);
            if (!itemId) {
                RED.notify("itemID not found for the selected item.", "warning");
                return;
            }

            if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
                navigator.clipboard.writeText(itemId).then(function () {
                    RED.notify("itemID copied.", "success");
                }).catch(function () {
                    RED.notify("Failed to copy itemID.", "error");
                });
                return;
            }

            var input = $("<textarea readonly></textarea>").val(itemId).css({
                position: "fixed",
                left: "-9999px",
                top: "0"
            });
            $("#node-input-opcda-browse-modal").append(input);
            input[0].select();
            try {
                document.execCommand("copy");
                RED.notify("itemID copied.", "success");
            } catch (error) {
                RED.notify("Failed to copy itemID.", "error");
            }
            input.remove();
        }

        function readValueFromPath(path) {
            var item = getItemAtPath(path);
            console.log("readValueFromPath - path:", path, "item:", item);
            var itemId = itemIdOf(item);
            console.log("readValueFromPath - itemId:", itemId);
            if (!itemId) {
                RED.notify("itemID not found for the selected item.", "warning");
                return;
            }

            var connectionId = $("#node-input-connection").val();
            if (!connectionId) {
                RED.notify("Select an OPC DA connection before reading.", "warning");
                return;
            }

            $.getJSON("opcda-client-config/" + encodeURIComponent(connectionId) + "/read", {
                itemID: itemId
            }).done(function (payload) {
                if (payload && payload.error) {
                    RED.notify("Read failed: " + payload.error, "error");
                } else if (payload) {
                    var valueText = payload.value !== undefined ? String(payload.value) : "undefined";
                    RED.notify("Tag value: " + valueText, "success");
                } else {
                    RED.notify("No value returned from the server.", "warning");
                }
            }).fail(function (xhr) {
                var message = xhr && xhr.responseJSON && xhr.responseJSON.error
                    ? xhr.responseJSON.error
                    : "Failed to read tag value.";
                RED.notify(message, "error");
            });
        }

        function setBrowseSelectedPath(path) {
            browseSelectedPath = path || "";
            $(".opcda-tree-row").removeClass("is-selected");
            if (browseSelectedPath) {
                $('.opcda-tree-row[data-path="' + browseSelectedPath + '"]').addClass("is-selected");
            }
        }

        function refreshNode(path) {
            if (!path) return;
            if (path === "root") {
                refreshBrowseRoot();
                return;
            }

            var item = getItemAtPath(path);
            if (!item || !item.isFolder) return;

            item.browse = undefined;

            // Clear expansion state for all sub-paths under this node
            var prefix = path + ".";
            for (var key in expansionState) {
                if (expansionState.hasOwnProperty(key) && key.indexOf(prefix) === 0) {
                    delete expansionState[key];
                }
            }

            expansionState[path] = true;
            saveBrowseSession();
            renderBrowseTree();
            expandNode(path);
        }

        function expandNode(path) {
            var item = getItemAtPath(path);
            if (!item || !canExpand(item)) return;

            if (isExpanded(path, false) && !Array.isArray(item.browse)) {
                renderBrowseTree();
            } else {
                expansionState[path] = !isExpanded(path, false);
                saveBrowseSession();
                if (!expansionState[path]) {
                    renderBrowseTree();
                    return;
                }
            }

            if (Array.isArray(item.browse)) {
                renderBrowseTree();
                return;
            }

            renderBrowseTree();
            var browseItemId = item.itemID;
            loadBrowse(browseItemId).done(function (payload) {
                try {
                    if (!payload) {
                        console.error("Browse returned empty payload for node " + browseItemId);
                        item.browse = [];
                    } else if (payload.error) {
                        console.error("Browse returned error for node " + browseItemId + ":", payload.error);
                        RED.notify(payload.error, "error");
                        item.browse = [];
                    } else {
                        item.browse = Array.isArray(payload.browse) ? payload.browse : [];
                    }
                    saveBrowseSession();
                    renderBrowseTree();
                } catch (e) {
                    console.error("Error processing browse results for node " + browseItemId, e);
                    item.browse = [];
                    expansionState[path] = false;
                    saveBrowseSession();
                    renderBrowseTree();
                }
            }).fail(function (xhr) {
                item.browse = [];
                expansionState[path] = false;
                saveBrowseSession();
                renderBrowseTree();
                var message = xhr && xhr.responseJSON && xhr.responseJSON.error
                    ? xhr.responseJSON.error
                    : "Failed to browse child nodes.";
                RED.notify(message, "error");
            });
        }

        // Register Node-RED Type
        RED.nodes.registerType("opcda-client", {
            category: "network",
            color: "#C0DEED",
            defaults: {
                name: { value: "" },
                connection: { value: "", type: "opcda-client-config", required: true },
                mode: { value: "read", required: true },
                tags: { value: "" },
                selectedItems: { value: "[]" },
                groupName: { value: "" },
                updateRate: { value: 1000, validate: RED.validators.number() },
                recursiveValues: { value: false },
                subscriptionMode: { value: "append" }
            },
            inputs: 1,
            outputs: 1,
            icon: "opcda.svg",
            label: function () {
                return this.name || "opcda-client (" + this.mode + ")";
            },
            oneditprepare: function () {
                console.log("opcda-client oneditprepare direct triggered");
                var node = this;
                console.log("oneditprepare: node.selectedItems =", node.selectedItems);
                console.log("oneditprepare: input selectedItems =", $("#node-input-selectedItems").val());

                $("#node-input-selectedItems").typedInput({
                    type: "json",
                    types: ["json"]
                });

                $(document).off("change.opcdaSelectedItems").on("change.opcdaSelectedItems", "#node-input-selectedItems", function () {
                    var rawVal = $(this).val();
                    var newItems = parseSelectedItems(rawVal);
                    if (JSON.stringify(newItems) !== JSON.stringify(selectedItemsState)) {
                        selectedItemsState = newItems;
                        rebuildItemIdIndex();
                        renderSelectedItems();
                        renderBrowseTree();
                    }
                });

                // Sync initial selections
                var savedVal = node.selectedItems;
                if (savedVal && typeof savedVal === "object") {
                    savedVal = JSON.stringify(savedVal);
                } else {
                    savedVal = savedVal || $("#node-input-selectedItems").val() || "[]";
                }
                selectedItemsState = parseSelectedItems(savedVal);

                // Fallback to node.tags if selectedItemsState is empty
                if (selectedItemsState.length === 0) {
                    var tagsVal = node.tags || $("#node-input-tags").val() || "";
                    if (tagsVal) {
                        var tagsList = tagsVal.split(/[\n,]+/).map(function (t) { return t.trim(); }).filter(Boolean);
                        if (tagsList.length > 0) {
                            selectedItemsState = tagsList.map(function (tag) {
                                var parts = tag.split(".");
                                var name = parts[parts.length - 1] || tag;
                                return {
                                    name: name,
                                    itemID: tag,
                                    nodeClass: "Variable",
                                    valueProperty: "payload",
                                    valuePropertyType: "msg"
                                };
                            });
                            // Sync back to hidden fields
                            updateSelectedItemsField();
                        }
                    }
                }

                rebuildItemIdIndex();
                renderSelectedItems();

                if (loadBrowseSession()) {
                    renderBrowseTree();
                } else {
                    browseState = null;
                    expansionState = {};
                    renderBrowseTree();
                }

                // Show/hide fields depending on mode
                $("#node-input-mode").on("change", function () {
                    var mode = $(this).val();
                    if (mode === "subscription") {
                        $(".opcda-client-sub-field").show();
                        $(".opcda-client-tags-field").show();
                        $("#node-input-tags-label").html('<i class="fa fa-tags"></i> Subscription Tags');
                    } else if (mode === "read") {
                        $(".opcda-client-sub-field").hide();
                        $(".opcda-client-tags-field").show();
                        $("#node-input-tags-label").html('<i class="fa fa-tags"></i> Read Tags');
                    } else if (mode === "write") {
                        $(".opcda-client-sub-field").hide();
                        $(".opcda-client-tags-field").show();
                        $("#node-input-tags-label").html('<i class="fa fa-tags"></i> Write Tag (Fallback)');
                    } else if (mode === "browse" || mode === "browseRecursive") {
                        $(".opcda-client-sub-field").hide();
                        $(".opcda-client-tags-field").show();
                        $("#node-input-tags-label").html('<i class="fa fa-tags"></i> Browse Path (Fallback)');
                    }

                    if (mode === "browseRecursive") {
                        $(".opcda-client-recursive-values-row").css("display", "flex");
                    } else {
                        $(".opcda-client-recursive-values-row").hide();
                    }
                });
                $("#node-input-mode").trigger("change");

                // Hook up open browse button
                $("#node-input-opcda-open-browse-modal").off("click").on("click", function (e) {
                    e.preventDefault();
                    console.log("Open browse modal button clicked");
                    openBrowseModal();
                    if (!browseState) {
                        refreshBrowseRoot();
                    }
                });

                $("#node-input-opcda-close-browse-modal").off("click").on("click", function (e) {
                    e.preventDefault();
                    closeBrowseModal();
                });

                $("#node-input-opcda-browse-root").off("click").on("click", function (e) {
                    e.preventDefault();
                    refreshBrowseRoot();
                });

                // Twisty expansion click
                $("#node-input-opcda-browse-tree").off("click", ".opcda-client-toggle-tree").on("click", ".opcda-client-toggle-tree", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var path = $(this).attr("data-path");
                    expandNode(path);
                });

                // Add/Remove tag toggle click
                $("#node-input-opcda-browse-tree").off("click", ".opcda-client-toggle-tag").on("click", ".opcda-client-toggle-tag", function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    var path = $(this).attr("data-path");
                    toggleSelectedNode(path);
                });

                // Row select click
                $("#node-input-opcda-browse-tree").off("click", ".opcda-tree-row").on("click", ".opcda-tree-row", function (e) {
                    e.preventDefault();
                    var path = $(this).attr("data-path");
                    setBrowseSelectedPath(path);

                    if (e.ctrlKey || e.metaKey) {
                        e.stopPropagation();
                        toggleSelectedNode(path);
                    }
                });

                // Row double click to expand/collapse
                $("#node-input-opcda-browse-tree").off("dblclick", ".opcda-tree-row").on("dblclick", ".opcda-tree-row", function (e) {
                    e.preventDefault();
                    var path = $(this).attr("data-path");
                    expandNode(path);
                });

                // Row context menu right click
                $("#node-input-opcda-browse-tree").off("contextmenu", ".opcda-tree-row").on("contextmenu", ".opcda-tree-row", function (e) {
                    e.preventDefault();
                    var path = $(this).attr("data-path");
                    setBrowseSelectedPath(path);
                    showTreeContextMenu(e.clientX, e.clientY, path);
                });

                // Hide context menu on click elsewhere
                $(document).off("mousedown.opcda-menu").on("mousedown.opcda-menu", function (e) {
                    if (!$(e.target).closest("#node-input-opcda-browse-context-menu").length) {
                        hideTreeContextMenu();
                    }
                });

                // Context menu actions
                $("#node-input-opcda-browse-context-refresh").off("click").on("click", function (e) {
                    e.preventDefault();
                    hideTreeContextMenu();
                    refreshNode(contextMenuPath);
                });

                $("#node-input-opcda-browse-context-copy-itemid").off("click").on("click", function (e) {
                    e.preventDefault();
                    hideTreeContextMenu();
                    copyNodeIdFromPath(contextMenuPath);
                });

                $("#node-input-opcda-browse-context-read-value").off("click").on("click", function (e) {
                    e.preventDefault();
                    hideTreeContextMenu();
                    readValueFromPath(contextMenuPath);
                });

                // Remove tag action on selected tags list
                $("#opcda-selected-tags").off("click", ".opcda-client-remove-tag").on("click", ".opcda-client-remove-tag", function (e) {
                    e.preventDefault();
                    var idx = Number($(this).attr("data-index"));
                    removeSelectedItemByIndex(idx);
                });

                // Change value property updates
                $("#opcda-selected-tags").off("change", ".opcda-client-item-value-prop").on("change", ".opcda-client-item-value-prop", function () {
                    var input = $(this);
                    var index = Number(input.attr("data-index"));
                    if (selectedItemsState[index]) {
                        selectedItemsState[index].valueProperty = input.val();
                        updateSelectedItemsField();
                    }
                });

                $("#opcda-selected-tags").off("change", ".opcda-client-item-value-type").on("change", ".opcda-client-item-value-type", function () {
                    var input = $(this);
                    var index = Number(input.attr("data-index"));
                    if (selectedItemsState[index]) {
                        selectedItemsState[index].valuePropertyType = input.val();
                        updateSelectedItemsField();
                    }
                });

                // Debounce search in browse tree
                var searchInput = $("#node-input-opcda-browse-search");
                var clearSearch = $("#node-input-opcda-browse-search-clear");
                
                var performSearch = debounce(function () {
                    browseSearchTerm = normalizeSearchTerm(browseSearchValue);
                    renderBrowseTree();
                }, 200);

                searchInput.off("input").on("input", function () {
                    browseSearchValue = $(this).val();
                    clearSearch.toggle(!!browseSearchValue);
                    performSearch();
                });

                clearSearch.off("click").on("click", function (e) {
                    e.preventDefault();
                    searchInput.val("");
                    browseSearchValue = "";
                    clearSearch.hide();
                    performSearch();
                });

                // Redraw tag chips if mode changes to 'write' to display Value property configuration
                $("#node-input-mode").off("change.renderSelected").on("change.renderSelected", function () {
                    renderSelectedItems();
                });
            },
            oneditcancel: function () {
                console.log("[OPC-DA] oneditcancel direct triggered");
                hideTreeContextMenu();
                $(document).off("mousedown.opcda-menu");
                $(document).off("change.opcdaSelectedItems");
            },
            oneditsave: function () {
                console.log("[OPC-DA] oneditsave direct triggered");
                commitSelectedItemsState(this);
                hideTreeContextMenu();
                $(document).off("mousedown.opcda-menu");
                $(document).off("change.opcdaSelectedItems");
            }
        });
    })();
</script>

<script type="text/html" data-template-name="opcda-client">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="opcda-client">
    </div>
    <div class="form-row">
        <label for="node-input-connection"><i class="fa fa-server"></i> Connection</label>
        <input type="text" id="node-input-connection">
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-exchange"></i> Mode</label>
        <select id="node-input-mode">
            <option value="read">Read</option>
            <option value="write">Write</option>
            <option value="browse">Browse</option>
            <option value="browseRecursive">Browse Recursive</option>
            <option value="subscription">Subscription</option>
        </select>
    </div>

    <!-- JSON editor field for tree selections -->
    <div class="form-row opcda-client-tags-field">
        <label for="node-input-selectedItems"><i class="fa fa-code"></i> JSON</label>
        <input type="text" id="node-input-selectedItems" class="opcda-client-json" style="width: 70%;">
    </div>

    <!-- Subscription-specific Settings -->
    <div class="form-row opcda-client-sub-field">
        <label for="node-input-groupName"><i class="fa fa-info-circle"></i> Group Name</label>
        <input type="text" id="node-input-groupName" placeholder="Group1">
    </div>
    <div class="form-row opcda-client-sub-field">
        <label for="node-input-updateRate"><i class="fa fa-clock-o"></i> Update Rate (ms)</label>
        <input type="number" id="node-input-updateRate" placeholder="1000">
    </div>
    <div class="form-row opcda-client-sub-field">
        <label for="node-input-subscriptionMode"><i class="fa fa-sliders"></i> Sub. Mode</label>
        <select id="node-input-subscriptionMode">
            <option value="append">Append tags (add to list)</option>
            <option value="replace">Replace tags (keep only current)</option>
        </select>
    </div>

    <!-- Recursive Browse Settings -->
    <div class="form-row opcda-client-recursive-values-row" style="display:none; align-items: center;">
        <label for="node-input-recursiveValues" style="width: auto; margin-right: 10px;"><i class="fa fa-eye"></i> Read tag values recursively</label>
        <input type="checkbox" id="node-input-recursiveValues" style="width: auto; margin: 0;">
    </div>

    <!-- Tree browse dialog trigger -->
    <div class="form-row opcda-client-tags-field">
        <label style="width:auto;"><i class="fa fa-sitemap"></i> Browse Tree</label>
        <a href="#" id="node-input-opcda-open-browse-modal" class="editor-button">
            <i class="fa fa-expand"></i> Open browse tree
        </a>
    </div>

    <!-- Selected tag chips container -->
    <div class="form-row opcda-client-tags-field" style="margin-bottom:0;">
        <label style="width:auto;"><i class="fa fa-tags"></i> Selected Tags</label>
    </div>
    <div class="form-row opcda-client-tags-field">
        <label style="width:auto;"></label>
        <div id="opcda-selected-tags" class="opcda-client-tag-box"></div>
    </div>

    <!-- Hidden input for manual tag configuration -->
    <input type="text" id="node-input-tags" style="display:none;">

    <!-- Modal browse dialog layout -->
    <div id="node-input-opcda-browse-modal" class="opcda-tree-modal" style="display:none;">
        <div class="opcda-tree-modal__dialog">
            <div class="opcda-tree-modal__header">
                <div class="opcda-tree-modal__title"><i class="fa fa-sitemap"></i> OPC DA Browse Tree</div>
                <a href="#" id="node-input-opcda-close-browse-modal" class="editor-button editor-button-small"><i class="fa fa-times"></i> Close</a>
            </div>
            <div class="opcda-tree-modal__toolbar">
                <a href="#" id="node-input-opcda-browse-root" class="editor-button editor-button-small"><i class="fa fa-search"></i> Browse Root</a>
                <div class="opcda-tree-search">
                    <i class="fa fa-search"></i>
                    <input type="text" id="node-input-opcda-opcda-browse-search" style="display:none;"> <!-- Dummy to prevent node-red auto-binding warning -->
                    <input type="text" id="node-input-opcda-browse-search" placeholder="Search for items already explored">
                    <a href="#" id="node-input-opcda-browse-search-clear" class="editor-button editor-button-small" style="display:none;"><i class="fa fa-times"></i></a>
                </div>
            </div>
            <div class="opcda-tree-modal__body">
                <div id="node-input-opcda-browse-tree" class="opcda-tree-editor"></div>
            </div>
        </div>
        <div id="node-input-opcda-browse-context-menu" class="opcda-tree-context-menu" style="display:none;">
            <a href="#" id="node-input-opcda-browse-context-refresh"><i class="fa fa-refresh"></i> Refresh node</a>
            <a href="#" id="node-input-opcda-browse-context-copy-itemid"><i class="fa fa-copy"></i> Copy itemID</a>
            <a href="#" id="node-input-opcda-browse-context-read-value"><i class="fa fa-eye"></i> Read value</a>
        </div>
    </div>
</script>

<script type="text/html" data-help-name="opcda-client">
    <p>OPC DA client node for read, write, browse, and subscription operations using a shared C# background process.</p>

    <h3>Modes Info</h3>
    
    <details style="margin-bottom: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
        <summary style="cursor: pointer; font-weight: bold; outline: none;"><i class="fa fa-book"></i> Read Mode</summary>
        <p style="margin-top: 5px;">Reads tag values from the server.</p>
        <p><b>Input (msg.payload):</b> Array of objects containing <code>itemID</code> (and optional friendly <code>name</code>). If empty, reads configured tags.</p>
        <pre>
[
  { "itemID": "Bucket Brigade.Int4", "name": "Int4" },
  { "itemID": "Bucket Brigade.Int2", "name": "Int2" }
]
        </pre>
        <p><b>Output (msg.payload):</b> Array of results with value, quality, and timestamp:</p>
        <pre>
[
  {
    "itemID": "Bucket Brigade.Int4",
    "name": "Int4",
    "value": 120,
    "quality": 192,
    "timestamp": "2026-06-29T02:08:52Z"
  }
]
        </pre>
    </details>

    <details style="margin-bottom: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
        <summary style="cursor: pointer; font-weight: bold; outline: none;"><i class="fa fa-edit"></i> Write Mode</summary>
        <p style="margin-top: 5px;">Writes one or more tag values to the server.</p>
        <p><b>Input (msg.payload):</b> Pass an array of objects to write multiple tags, a single object to write a single tag, or a raw value (if configured tags are present):</p>
        <pre>
// Multiple:
[
  { "itemID": "Bucket Brigade.Int4", "name": "Int4", "value": 42 },
  { "itemID": "Bucket Brigade.Int2", "name": "Int2", "value": 100 }
]

// Single:
{ "itemID": "Bucket Brigade.Int4", "value": 42 }

// Raw Scalar (requires configured tags):
42
        </pre>
        <p><b>Output (msg.payload):</b> Array of write results:</p>
        <pre>
[
  { "tag": "Bucket Brigade.Int4", "success": true }
]
        </pre>
    </details>

    <details style="margin-bottom: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
        <summary style="cursor: pointer; font-weight: bold; outline: none;"><i class="fa fa-sitemap"></i> Browse Mode</summary>
        <p style="margin-top: 5px;">Explores the server's namespace at a given level.</p>
        <p><b>Input (msg.payload):</b> String path or array of objects containing <code>itemID</code>. Send empty string or leave empty to browse root.</p>
        <pre>
"Simulation Items.Random"
        </pre>
        <p><b>Output (msg.payload):</b> Array of paths and children (leaves listed first, then branches/folders):</p>
        <pre>
[
  {
    "itemID": "Simulation Items.Random",
    "name": "Random",
    "children": [
      { "itemID": "Simulation Items.Random.Int4", "name": "Int4", "isFolder": false, "type": "Int32" },
      { "itemID": "Simulation Items.Random.SubFolder", "name": "SubFolder", "isFolder": true }
    ]
  }
]
        </pre>
    </details>

    <details style="margin-bottom: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
        <summary style="cursor: pointer; font-weight: bold; outline: none;"><i class="fa fa-code-fork"></i> Browse Recursive Mode</summary>
        <p style="margin-top: 5px;">Performs a recursive search across all branches/folders starting from the specified path.</p>
        <p><b>Input (msg.payload):</b> Same as Browse mode.</p>
        <p><b>Output (msg.payload):</b> Nested tree structure. If <i>Read tag values recursively</i> is checked in node panel, leaves are populated with their active value data:</p>
        <pre>
[
  {
    "itemID": "Simulation Items.Random",
    "name": "Random",
    "children": [
      { 
        "itemID": "Simulation Items.Random.Int4", 
        "name": "Int4", 
        "isFolder": false, 
        "value": 42, 
        "quality": 192, 
        "timestamp": "2026-06-29T02:08:52Z" 
      },
      { 
        "itemID": "Simulation Items.Random.SubFolder", 
        "name": "SubFolder", 
        "isFolder": true,
        "children": [
           // Nested leaves and branches...
        ]
      }
    ]
  }
]
        </pre>
    </details>

    <details style="margin-bottom: 10px; border: 1px solid #ddd; padding: 10px; border-radius: 4px;">
        <summary style="cursor: pointer; font-weight: bold; outline: none;"><i class="fa fa-rss"></i> Subscription Mode</summary>
        <p style="margin-top: 5px;">Establishes a subscription group and streams tag changes to flow output.</p>
        <p><b>Input (msg.payload):</b> Array of tags to subscribe to. If not provided, uses configured tags.</p>
        <p><b>Output (msg.payload):</b> Streams an array of event objects in real-time when data changes:</p>
        <pre>
[
  {
    "itemID": "Random.Int4",
    "name": "Int4",
    "value": 123,
    "quality": 192,
    "timestamp": "2026-06-29T02:08:52Z"
  }
]
        </pre>
        
        <p><b>Subscription Mode Settings & Overrides:</b></p>
        <ul>
            <li><b>Sub. Mode option in panel:</b>
                <ul>
                    <li><code>Append tags</code>: Adds incoming tags to the active list (keeps existing ones).</li>
                    <li><code>Replace tags</code>: Replaces all active tags in the group with the new incoming ones.</li>
                </ul>
            </li>
            <li><b>Dynamic overrides via <code>msg.opcda</code>:</b>
                <pre>
// Example overriding mode and action:
msg.opcda = {
  "action": "subscribe" | "unsubscribe" | "clear",
  "subscriptionMode": "append" | "replace" | "clear", // or mode: "replace"
  "groupName": "CustomGroupName",
  "updateRate": 500
}
                </pre>
                <ul>
                    <li>Use <code>action: "unsubscribe"</code> to remove the tags in <code>msg.payload</code>.</li>
                    <li>Use <code>action: "clear"</code> (or <code>subscriptionMode: "clear"</code>) to clear the entire group's subscription.</li>
                </ul>
            </li>
        </ul>
    </details>
</script>
